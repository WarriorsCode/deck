version: 2
builds:
  - main: ./cmd/deck
    binary: deck
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/warriorscode/deck.Version={{ .Version }}

archives:
  - formats:
      - tar.gz

homebrew_casks:
  - repository:
      owner: warriorscode
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/warriorscode/deck
    description: Lightweight local dev orchestrator
